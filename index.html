<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 BLE Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0D0F14; --bg2: #141720; --panel: #1A1D26;
            --accent-temp: #FF6B35; --accent-pres: #00C2FF;
            --accent-ok: #00FF9F; --accent-err: #FF3860; --text: #E8EAF0;
        }
        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Courier New', Courier, monospace; margin: 0; padding: 15px;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .status-dot { width: 12px; height: 12px; background: var(--accent-err); border-radius: 50%; display: inline-block; }
        .card-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .card { background: var(--panel); padding: 15px; border-radius: 8px; border: 1px solid #2A2F3F; text-align: center; }
        .val { font-size: 1.8rem; font-weight: bold; display: block; }
        .temp { color: var(--accent-temp); } .pres { color: var(--accent-pres); }
        .btn {
            background: var(--bg2); border: 1px solid #2A2F3F; color: var(--accent-ok);
            padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 10px;
        }
        canvas { background: var(--bg2); border-radius: 8px; margin-bottom: 10px; }
        .control-group { background: var(--panel); padding: 15px; border-radius: 8px; margin-top: 20px; }
        input { background: #1C2030; border: 1px solid #2A2F3F; color: white; padding: 8px; width: 60px; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 1.2rem; font-weight: bold; color: var(--accent-pres);">ESP32 MONITOR</div>
    <div>
        <span id="status-text" style="color: var(--accent-err);">DESCONECTADO</span>
        <div id="dot" class="status-dot"></div>
    </div>
</div>

<button id="connectBtn" class="btn">CONECTAR ESP32</button>

<div class="card-container">
    <div class="card">
        <span style="font-size: 0.7rem; color: #8890A8;">TEMPERATURA</span>
        <span id="temp-val" class="val temp">0.0</span>
        <span style="color: var(--accent-temp);">°C</span>
    </div>
    <div class="card">
        <span style="font-size: 0.7rem; color: #8890A8;">PRESIÓN</span>
        <span id="pres-val" class="val pres">0.0</span>
        <span style="color: var(--accent-pres);">hPa</span>
    </div>
</div>

<canvas id="chart"></canvas>

<div class="control-group">
    <label style="font-size: 0.8rem; color: #8890A8;">ÁNGULO SERVO (0-180)</label><br><br>
    <input type="number" id="servoAngle" value="90">
    <button id="sendBtn" class="btn" style="width: auto; margin-left: 10px; display: inline-block;">ENVIAR</button>
</div>

<script>
    // UUIDs idénticos a los del PC
    const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
    const RX_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
    const TX_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";

    let device, server, characteristicRX, characteristicTX;

    // Configuración de la Gráfica
    const ctx = document.getElementById('chart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: Array(20).fill(''),
            datasets: [
                { label: 'Temp', borderColor: '#FF6B35', data: [], tension: 0.4, borderWidth: 2, pointRadius: 0 },
                { label: 'Pres', borderColor: '#00C2FF', data: [], tension: 0.4, borderWidth: 2, pointRadius: 0 }
            ]
        },
        options: { 
            responsive: true, 
            scales: { 
                y: { grid: { color: '#1E2235' }, ticks: { color: '#8890A8' } }, 
                x: { display: false } 
            },
            plugins: { legend: { labels: { color: '#E8EAF0' } } }
        }
    });

    async function connect() {
        try {
            // Filtro por el nombre configurado en el ESP32
            device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'ESP32-DIGI2' }],
                optionalServices: [SERVICE_UUID]
            });

            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            characteristicRX = await service.getCharacteristic(RX_UUID);
            characteristicTX = await service.getCharacteristic(TX_UUID);

            await characteristicTX.startNotifications();
            characteristicTX.addEventListener('characteristicvaluechanged', handleNotifications);

            document.getElementById('status-text').innerText = "CONECTADO";
            document.getElementById('status-text').style.color = "#00FF9F";
            document.getElementById('dot').style.background = "#00FF9F";
        } catch (error) {
            console.error("Fallo conexión:", error);
        }
    }

    function handleNotifications(event) {
        let value = new TextDecoder().decode(event.target.value);
        try {
            let data = JSON.parse(value);
            if (data.t && data.p) {
                // Actualizar números en pantalla
                document.getElementById('temp-val').innerText = data.t.toFixed(1);
                document.getElementById('pres-val').innerText = (data.p / 100).toFixed(2);

                // Actualizar gráfica
                chart.data.datasets[0].data.push(data.t);
                chart.data.datasets[1].data.push(data.p / 100);
                if (chart.data.datasets[0].data.length > 20) {
                    chart.data.datasets[0].data.shift();
                    chart.data.datasets[1].data.shift();
                }
                chart.update();
            }
        } catch (e) { }
    }

    async function sendAngle() {
        if (!characteristicRX) return;
        const angle = document.getElementById('servoAngle').value;
        const cmd = "ANGLE:" + angle;
        const encoder = new TextEncoder();
        await characteristicRX.writeValue(encoder.encode(cmd));
    }

    document.getElementById('connectBtn').addEventListener('click', connect);
    document.getElementById('sendBtn').addEventListener('click', sendAngle);
</script>

</body>
</html>
